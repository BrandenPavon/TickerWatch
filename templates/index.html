<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1, h2 {
            margin-bottom: 10px;
        }
        .section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .item:last-child {
            border-bottom: none;
        }
        .positive {
            color: green;
        }
        .negative {
            color: red;
        }
    </style>
</head>
<body>

    <h1>📊 Portfolio Dashboard</h1>

    <!-- Portfolio Daily Change -->
    <div class="section">
        <h2>Portfolio Daily Change</h2>
        {% for name, value in data_portfoliodaily.items() %}
            <div class="item">
                <span>{{ name }}</span>
                <span class="{{ 'positive' if value >= 0 else 'negative' }}">
                    {{ (value * 100) | round(2) }}%
                </span>
            </div>
        {% endfor %}
    </div>

    <!-- Individual Tickers -->
    <div class="section">
        <h2>All Tickers Daily Change</h2>
        {% for ticker, value in data_alltickersdaily.items() %}
            <div class="item">
                <span>{{ ticker }}</span>
                <span class="{{ 'positive' if value >= 0 else 'negative' }}">
                    {{ (value * 100) | round(2) }}%
                </span>
            </div>
        {% endfor %}
    </div>

</body>
</html>
